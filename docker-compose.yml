version: '3.8'

services:
  db:
    image: postgres          # 사용할 이미지
    container_name: liveklass-db
    environment:
      POSTGRES_DB: liveklass
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"          # 내 컴퓨터:컨테이너 포트 연결
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql  # 시작할 때 테이블 자동 생성

  app:
    image: python:3.11
    container_name: liveklass-app
    working_dir: /app
    volumes:
      - .:/app               # 현재 폴더를 컨테이너 안으로 연결
    command: >
      bash -c "pip install psycopg2-binary &&
               python generator.py"
    depends_on:
      - db                   # db가 먼저 실행된 후에 app 실행